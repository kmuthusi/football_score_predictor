[global]
appName = "Football Correct Score Predictor"
# Human-friendly short description used by Streamlit Cloud and for discoverability.
description = "Estimate exact football scoreline probabilities (Poisson + Dixon-Coles + calibration)."

[theme]
primaryColor = "#0E63AA"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#0f1724"
font = "sans serif"

[server]
headless = true
