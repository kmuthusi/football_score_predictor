name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-evaluate:
    runs-on: ubuntu-latest
    env:
      # Lowered defaults: stricter thresholds (override via repo secrets if needed)
      IMPUTATION_ROW_PROP_THRESHOLD: 0.10
      IMPUTATION_COL_RATE_THRESHOLD: 0.05
      LOW_SCORE_BIAS_THRESHOLD: 0.02
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      IMPUTATION_TELEMETRY_URL: ${{ secrets.IMPUTATION_TELEMETRY_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Ensure model artifact exists
        run: |
          if [ ! -f models/score_models.joblib ]; then
            python train.py --matches data/spi_matches.csv --stadiums data/stadium_coordinates_completed_full.csv --out models --max-goals 4 --max-iter 500
          fi

      - name: Reproducible JSON evaluation
        run: |
          python evaluate_reproducible.py \
            --artifact models/score_models.joblib \
            --matches data/spi_matches.csv \
            --stadiums data/stadium_coordinates_completed_full.csv \
            --json > evaluation_metrics.json

      - name: Imputation monitoring (generate report)
        run: |
          python monitor_imputation.py \
            --artifact models/score_models.joblib \
            --matches data/spi_matches.csv \
            --stadiums data/stadium_coordinates_completed_full.csv \
            --recent-days 365 \
            --out imputation_report.json || true

      - name: Low-score bias analysis
        run: |
          python scripts/low_score_analysis.py || true

      - name: Check low-score bias thresholds
        continue-on-error: true
        run: |
          python scripts/check_low_score_bias.py \
            --report reports/low_score_bias.json \
            --max-bias ${LOW_SCORE_BIAS_THRESHOLD:-0.02}

      - name: Upload evaluation artifact
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-metrics-json-run-${{ github.run_number }}-sha-${{ github.sha }}
          path: evaluation_metrics.json
          if-no-files-found: error

      - name: Upload imputation report artifact
        uses: actions/upload-artifact@v4
        with:
          name: imputation-report-run-${{ github.run_number }}-sha-${{ github.sha }}
          path: imputation_report.json
          if-no-files-found: warn

      - id: imputation_check
        name: Check imputation thresholds (may fail)
        continue-on-error: true
        run: |
          python scripts/check_imputation_thresholds.py \
            --report imputation_report.json \
            --max-row-prop ${IMPUTATION_ROW_PROP_THRESHOLD} \
            --max-col-rate ${IMPUTATION_COL_RATE_THRESHOLD}

      - name: Create GitHub issue for imputation threshold violation
        if: ${{ steps.imputation_check.outcome == 'failure' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = `${process.env.GITHUB_WORKSPACE}/imputation_report.json`;
            let rpt = {};
            try { rpt = JSON.parse(fs.readFileSync(path, 'utf8')); } catch (e) { rpt = { error: 'report not found' }; }
            const title = `Imputation threshold breach — run #${process.env.GITHUB_RUN_NUMBER}`;
            const topCols = (rpt.top_imputed_columns || []).slice(0,5).map(c => `- ${c.col}: ${c.missing_rate}`).join('\n') || 'n/a';
            const body = `Imputation thresholds were exceeded in workflow run [#${process.env.GITHUB_RUN_NUMBER}](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}).\n\n` +
            `**Rows with any imputation:** ${rpt.rows_with_any_imputation_prop || 'n/a'}\n\n` +
            `**Top imputed columns:**\n${topCols}\n\n` +
            `See attached imputation_report.json artifact for details and sample matches.`;
            await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body });

      - name: Send Slack alert for imputation threshold violation
        if: ${{ steps.imputation_check.outcome == 'failure' && env.SLACK_WEBHOOK_URL != '' }}
        run: |
          python - <<'PY'
          import json, sys, os
          try:
              rpt = json.load(open('imputation_report.json'))
          except Exception:
              rpt = {}
          rows_prop = rpt.get('rows_with_any_imputation_prop', 'n/a')
          top = rpt.get('top_imputed_columns', [])[:5]
          top_cols = ', '.join([f"{c.get('col')}:{c.get('missing_rate'):.3f}" for c in top])
          text = f"[{os.getenv('GITHUB_REPOSITORY')}] Imputation alert (run #{os.getenv('GITHUB_RUN_NUMBER')}) - rows_with_any_imputation_prop={rows_prop} top_cols={top_cols}"
          payload = json.dumps({'text': text})
          os.system(f"curl -sS -X POST -H 'Content-type: application/json' --data '{payload}' '{os.getenv('SLACK_WEBHOOK_URL')}' || true")
          PY

      - name: Send imputation report to telemetry (if configured)
        if: ${{ env.IMPUTATION_TELEMETRY_URL != '' }}
        run: |
          curl -sSf -X POST -H "Content-Type: application/json" --data-binary @imputation_report.json "$IMPUTATION_TELEMETRY_URL" || true

  validate-preprocessing-artifact:
    name: Validate prediction preprocessing against production artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure model artifact exists (production)
        run: |
          if [ ! -f models/score_models.joblib ]; then
            echo "Model artifact not found in repo: models/score_models.joblib"
            echo "Failing validation job so artifact parity is fixed before merge."
            exit 1
          fi

      - name: Run preprocessing validation test against artifact
        run: |
          # Run only the predict preprocessing unit test that asserts feature-column parity
          python -m unittest tests.test_predict_preprocessing.TestPredictPreprocessing.test_prepare_row_matches_artifact_columns

  rl-smoke:
    name: RL training & evaluation (smoke)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine if RL smoke needed
        id: should_run
        run: |
          git fetch --no-tags origin ${{ github.sha }} || true
          if git diff --name-only ${{ github.sha }}~1 ${{ github.sha }} | grep -E '^(rl_.*\.py|tests/test_rl_.*\.py|features\.py|predict\.py)' >/dev/null; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip RL smoke
        if: ${{ steps.should_run.outputs.run == 'false' }}
        run: |
          echo "No RL-related changes detected; skipping smoke steps."
          exit 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache model artifact
        uses: actions/cache@v4
        with:
          path: models/score_models.joblib
          key: ${{ runner.os }}-artifact-${{ hashFiles('train.py','features.py','predict.py') }}
          restore-keys: |
            ${{ runner.os }}-artifact-

      - name: Ensure model artifact exists
        run: |
          if [ ! -f models/score_models.joblib ]; then
            python train.py --matches data/spi_matches.csv --stadiums data/stadium_coordinates_completed_full.csv --out models --max-goals 4 --max-iter 500
          fi

      - name: RL train (smoke)
        run: |
          python rl_train.py --artifact models/score_models.joblib --matches data/spi_matches.csv --stadiums data/stadium_coordinates_completed_full.csv --epochs 1 --save models/rl_policy_test.joblib --no-test-eval

      - name: Validate RL policy safety
        run: |
          # Fail the job if the saved policy artifact is missing safety metadata
          python scripts/check_rl_policy_safety.py --policy models/rl_policy_test.joblib

      - name: RL eval (smoke)
        run: |
          python rl_eval.py --policy models/rl_policy_test.joblib --artifact models/score_models.joblib --matches data/spi_matches.csv --stadiums data/stadium_coordinates_completed_full.csv

      - name: Run RL unit tests
        run: |
          python -m unittest tests.test_rl_env tests.test_rl_train_smoke tests.test_rl_eval_smoke

      - name: Upload RL policy artifact
        uses: actions/upload-artifact@v4
        with:
          name: rl-policy-test-run-${{ github.run_number }}-sha-${{ github.sha }}
          path: models/rl_policy_test.joblib
          if-no-files-found: warn
